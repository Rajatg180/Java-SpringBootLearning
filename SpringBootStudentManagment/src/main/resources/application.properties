
# for praticse we are using in-memory database H2, so we need to add the below properties for H2 database configuration
# spring boot configure the datasource automatically based on the properties defined in the application.properties file.


#App name
spring.application.name = StudentManagementSystem

#H2 database settings
spring.datasource.url=jdbc:h2:mem:studentdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / hibernate settings

# This will create/update the database schema based on the entity classes
spring.jpa.hibernate.ddl-auto=update  
# This will show the SQL statements in the console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console